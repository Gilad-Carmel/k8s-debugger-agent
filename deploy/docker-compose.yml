# deploy/docker-compose.yml
#
# Minimal local stack: agent + slack-mock.
#
# Intentionally NO kind cluster and NO mcp-server here:
#   - The host has a wrapping `docker run` that injects --user=<uid:gid>, so
#     spinning up kind from a sidecar container is fragile in this env.
#   - src/mcp_server only implements stdio transport today; there's no HTTP
#     server to host.
#
# What works:
#   - `agent` boots, exposes /health on :8080 (FastAPI factory: src.agent.api:create_app)
#   - `slack-mock` boots on :8090 and can call back into the agent
#
# Bring up:
#   docker compose -f deploy/docker-compose.yml up --build

name: k8s-debugger

services:

  agent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.agent
    ports:
      - "8080:8080"
    networks:
      - triage
    volumes:
      - sqlite_data:/app/data
      - ./kubeconfig-docker.yaml:/root/.kube/config:ro
    env_file:
      - dev.env
    environment:
      SQLITE_PATH: /app/data/agent.sqlite3
      SLACK_MOCK_URL: http://slack-mock:8090
      KUBECONFIG: /root/.kube/config
      WATCH_NAMESPACES: demo
      POLL_INTERVAL_SECONDS: "4"
      LISTENER_LOOKBACK_MINUTES: "5"
      DISCORD_BOT_URL: http://discord-bot:8091
      CHAT_SURFACE: "${CHAT_SURFACE:-slack}"
    extra_hosts:
      # So LLM_BASE_URL=http://host.docker.internal:11434/v1 works on Linux.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health',timeout=2).status==200 else 1)\""
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  slack-mock:
    build:
      context: ..
      dockerfile: deploy/slack_mock/Dockerfile
    ports:
      - "8090:8090"
    networks:
      - triage
    env_file:
      - dev.env
    environment:
      AGENT_URL: http://agent:8080
      AGENT_CALLBACK_URL: http://agent:8080
      SLACK_MOCK_PORT: "8090"
    depends_on:
      agent:
        condition: service_started
    restart: unless-stopped

  discord-bot:
    build:
      context: ..
      dockerfile: deploy/discord_bot/Dockerfile
    ports:
      - "8091:8091"
    networks:
      - triage
    env_file:
      - dev.env
    environment:
      AGENT_URL: http://agent:8080
      BOT_PORT: "8091"
      DISCORD_TOKEN: "${DISCORD_TOKEN:-}"
      DISCORD_CHANNEL_ID: "${DISCORD_CHANNEL_ID:-}"
    depends_on:
      agent:
        condition: service_started
    restart: unless-stopped

volumes:
  sqlite_data:
    driver: local

networks:
  triage:
    driver: bridge
